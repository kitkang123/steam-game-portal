name: Weekly Steam Strategy Update

on:
  schedule:
    # 毎週日北京时间上午 8 点自动运行
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Crawler & AI Content Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run workflow

      - name: Commit & Push New Weekly Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/current.json src/data/history.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update weekly top sellers and reviews [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No new changes to commit."
          fi

      - name: Build Web Application
        env:
          VITE_HUMBLE_PARTNER: ${{ secrets.VITE_HUMBLE_PARTNER || vars.VITE_HUMBLE_PARTNER }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
